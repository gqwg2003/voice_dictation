name: Auto Version Bump

on:
  push:
    branches:
      - main

jobs:
  version-bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Fetch all history for tags and branches

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Auto bump version
        shell: bash
        run: |
          python scripts/bump_version.py auto --dry-run
          NEW_VERSION=$(python scripts/bump_version.py auto --dry-run | grep "New version:" | cut -d " " -f 3)
          echo "New version: $NEW_VERSION"
          if [ -n "$NEW_VERSION" ]; then
            # Create Python script file
            cat > update_version.py << 'EOL'
import json
import os
from datetime import datetime

version_file = 'utils/version_data.json'
with open(version_file, 'r', encoding='utf-8') as f:
    data = json.load(f)

data['version'] = os.environ['NEW_VERSION']
data['display_version'] = os.environ['NEW_VERSION']
data['is_prerelease'] = False
data['updated_at'] = datetime.now().isoformat()
data['build_number'] = data.get('build_number', 0) + 1
data['app_info']['version'] = os.environ['NEW_VERSION']
data['app_info']['version_full'] = os.environ['NEW_VERSION']
data['app_info']['is_prerelease'] = False

with open(version_file, 'w', encoding='utf-8') as f:
    json.dump(data, f, indent=2, ensure_ascii=False)
EOL
            # Update version data
            python update_version.py
            
            # Create tag
            python scripts/bump_version.py auto -m "Automatic version bump by GitHub Actions"
            
            # Push changes
            git add utils/version_data.json
            git commit -m "Update version data to $NEW_VERSION [skip ci]"
            git push origin main
            git push origin "$NEW_VERSION"
          fi 